<!DOCTYPE html>
<html>
    <head>
        <title>Phased</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body>
        <div class="container">
            <div class="glow"></div>
            <div class="content">
                <h1>One last step!</h1>
                <div>
                    <h2>What is your activity level?</h2>
                    <select name="activity" id="activity">
                        <option value="sedentary">Little to No Activity</option>
                        <option value="lightly active">Lightly Active (1-3 days per week)</option>
                        <option value="moderately active">Moderately Active (3-5 days per week)</option>
                        <option value="very active">Very Active (6-7 days per week)</option>
                    </select>    
                </div>            
                <div>
                    <h2>When was your last period?</h2>
                    <input type="date" id="period" name="period">
                </div>
                <a href="/homepage"><button>All Set!</button></a>
            </div>
        </div>
    </body>
</html>
